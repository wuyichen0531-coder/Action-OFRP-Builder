name: "OrangeFox R14 Boot-as-Recovery Build"

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "master"

permissions:
  contents: "write"
  packages: "write"
  actions: "write"

env:
  DEVICE: "PHQ110"
  DEVICE_NAME: "OPPO A1 Pro 5G"
  MANIFEST: "https://gitlab.com/OrangeFox/Manifest.git"
  BRANCH: "fox_14.1"
  BUILD_TARGET: "recoveryimage"
  CCACHE_DIR: "${{ github.workspace }}/ccache"
  CCACHE_SIZE: "50G"
  JAVA_HOME: "/usr/lib/jvm/java-11-openjdk-amd64"
  STOCK_BOOT_URL: "https://github.com/wuyichen0531-coder/action_build_twrp_device_tree/releases/download/2/boot.img"
  MAGISK_VERSION: "v27.0"

jobs:
  build:
    name: "Build OrangeFox Boot-as-Recovery"
    runs-on: "ubuntu-22.04"
    timeout-minutes: 540

    steps:
      - name: "Checkout Repository"
        uses: "actions/checkout@v4"
        continue-on-error: false
        with:
          fetch-depth: 1

      - name: "Free Up Disk Space [CRITICAL]"
        continue-on-error: false
        timeout-minutes: 15
        run: |
          echo "=== Before Cleanup ==="
          df -h
          
          echo ""
          echo "=== Removing Android SDK (12GB) ==="
          sudo rm -rf /usr/local/lib/android || true
          
          echo ""
          echo "=== Removing Docker Images (10GB) ==="
          docker rmi $(docker image ls -aq) >/dev/null 2>&1 || true
          
          echo ""
          echo "=== Removing Unused Tools ==="
          sudo rm -rf /usr/share/dotnet /usr/local/.ghcup /usr/local/share/powershell || true
          sudo rm -rf /opt/ghc /opt/hostedtoolcache/CodeQL /opt/mssql-tools || true
          sudo rm -rf /usr/local/lib/node_modules /usr/local/share/chromium || true
          sudo rm -rf /usr/local/graalvm /usr/local/share/boost || true
          
          echo ""
          echo "=== Clean APT Cache ==="
          sudo apt-get clean
          sudo apt-get autoremove -y
          
          echo ""
          echo "=== After Cleanup ==="
          df -h
          echo "✓ Freed ~40GB disk space!"

      - name: "Install System Dependencies"
        continue-on-error: false
        timeout-minutes: 30
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git-core gnupg flex bison build-essential zip curl wget \
            zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
            lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev \
            libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
            python3 python3-pip libssl-dev liblz4-tool rsync schedtool \
            squashfs-tools openjdk-11-jdk ccache repo cpio device-tree-compiler

      - name: "Configure Git Environment"
        continue-on-error: false
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config --global color.ui false

      - name: "Setup CCache"
        continue-on-error: false
        uses: "actions/cache@v4"
        with:
          path: "${{ env.CCACHE_DIR }}"
          key: "ccache-orangefox-bar-${{ env.DEVICE }}-${{ github.sha }}"
          restore-keys: |
            ccache-orangefox-bar-${{ env.DEVICE }}-
            ccache-orangefox-bar-

      - name: "Download Tools [x86_64 ARCH FIXED]"
        continue-on-error: false
        timeout-minutes: 10
        run: |
          mkdir -p ${{ github.workspace }}/tools
          cd ${{ github.workspace }}/tools
          
          echo "=== System Architecture ==="
          uname -m
          
          echo ""
          echo "=== Downloading Magisk ${{ env.MAGISK_VERSION }} ==="
          wget -O Magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/${{ env.MAGISK_VERSION }}/Magisk-${{ env.MAGISK_VERSION }}.apk"
          
          # ✅ 关键修复：提取 x86_64 版本（GitHub Actions是x86_64）
          echo ""
          echo "=== Extracting x86_64 magiskboot ==="
          unzip -j Magisk.apk "lib/x86_64/libmagiskboot.so" -d .
          mv libmagiskboot.so magiskboot
          chmod +x magiskboot
          
          echo ""
          echo "=== Verify Binary ==="
          file magiskboot
          
          echo ""
          echo "=== Test Execution ==="
          ./magiskboot --help 2>&1 | head -5
          
          echo ""
          echo "=== DTC Version ==="
          dtc --version
          
          echo ""
          echo "✓ All tools ready!"

      - name: "Download and Unpack Stock Boot Image"
        continue-on-error: false
        timeout-minutes: 15
        run: |
          mkdir -p ${{ github.workspace }}/stock_boot
          cd ${{ github.workspace }}/stock_boot
          wget -O boot.img "${{ env.STOCK_BOOT_URL }}"
          cp ${{ github.workspace }}/tools/magiskboot .
          ./magiskboot unpack boot.img
          echo "=== Unpacked Components ==="
          ls -la

      - name: "Initialize OrangeFox R14 Source"
        continue-on-error: false
        timeout-minutes: 60
        run: |
          mkdir -p ${{ github.workspace }}/orangefox
          cd ${{ github.workspace }}/orangefox
          repo init -u ${{ env.MANIFEST }} -b fox_14.1 --depth=1 --partial

      - name: "Sync OrangeFox Source Code"
        continue-on-error: false
        timeout-minutes: 180
        run: |
          cd ${{ github.workspace }}/orangefox
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: "Create Device Tree [Boot-as-Recovery FIXED]"
        continue-on-error: false
        run: |
          mkdir -p ${{ github.workspace }}/orangefox/device/oppo/${{ env.DEVICE }}/prebuilt
          cd ${{ github.workspace }}/orangefox/device/oppo/${{ env.DEVICE }}
          
          # Copy kernel
          if [ -f "${{ github.workspace }}/stock_boot/kernel" ]; then
              gzip -c ${{ github.workspace }}/stock_boot/kernel > prebuilt/Image.gz
          elif [ -f "${{ github.workspace }}/stock_boot/kernel.gz" ]; then
              cp ${{ github.workspace }}/stock_boot/kernel.gz prebuilt/Image.gz
          fi
          
          # Copy DTB
          [ -f "${{ github.workspace }}/stock_boot/dtb" ] && cp ${{ github.workspace }}/stock_boot/dtb prebuilt/dtb
          
          # BoardConfig.mk
          cat > BoardConfig.mk << 'EOF'
          TARGET_BOARD_PLATFORM := bengal
          TARGET_ARCH := arm64
          TARGET_ARCH_VARIANT := armv8-2a
          TARGET_CPU_VARIANT := cortex-a55
          TARGET_2ND_ARCH := arm
          TARGET_2ND_ARCH_VARIANT := armv8-2a
          TARGET_2ND_CPU_VARIANT := cortex-a55
          TARGET_BOOTLOADER_BOARD_NAME := bengal
          TARGET_NO_BOOTLOADER := true
          TARGET_PREBUILT_KERNEL := device/oppo/PHQ110/prebuilt/Image.gz
          BOARD_KERNEL_CMDLINE := console=ttyMSM0,115200n8 androidboot.hardware=qcom
          BOARD_KERNEL_BASE := 0x00000000
          BOARD_KERNEL_PAGESIZE := 4096
          BOARD_KERNEL_TAGS_OFFSET := 0x01E00000
          BOARD_RAMDISK_OFFSET := 0x02000000
          BOARD_DTB_OFFSET := 0x01F00000
          BOARD_INCLUDE_DTB_IN_BOOTIMG := true
          TARGET_PREBUILT_DTB := device/oppo/PHQ110/prebuilt/dtb
          
          # Boot-as-Recovery Configuration
          BOARD_USES_RECOVERY_AS_BOOT := true
          BOARD_HAS_NO_RECOVERY_PARTITION := true
          BOARD_BUILD_RECOVERY_IMAGE := false
          BOARD_BUILD_BOOT_IMAGE := true
          TW_INCLUDE_RECOVERY_RAMDISK_IN_BOOT := true
          
          BOARD_BUILD_SYSTEM_ROOT_IMAGE := true
          BOARD_BOOTIMAGE_PARTITION_SIZE := 100663296
          BOARD_RECOVERYIMAGE_PARTITION_SIZE := 100663296
          BOARD_CACHEIMAGE_PARTITION_SIZE := 268435456
          BOARD_CACHEIMAGE_FILE_SYSTEM_TYPE := ext4
          BOARD_VENDORIMAGE_PARTITION_SIZE := 1610612736
          BOARD_VENDORIMAGE_FILE_SYSTEM_TYPE := ext4
          BOARD_PRODUCTIMAGE_PARTITION_SIZE := 2684354560
          BOARD_PRODUCTIMAGE_FILE_SYSTEM_TYPE := ext4
          BOARD_SYSTEMIMAGE_PARTITION_SIZE := 4294967296
          BOARD_SYSTEMIMAGE_FILE_SYSTEM_TYPE := ext4
          BOARD_USERDATAIMAGE_PARTITION_SIZE := 118111600640
          BOARD_FLASH_BLOCK_SIZE := 262144
          AB_OTA_UPDATER := true
          AB_OTA_PARTITIONS := boot dtbo system vendor product vbmeta vbmeta_system
          TW_INCLUDE_CRYPTO := true
          TW_INCLUDE_CRYPTO_FBE := true
          TW_USE_FSCRYPT_POLICY := 2
          TW_CRYPTO_USE_SYSTEM_VOLD := true
          TW_CRYPTO_FBE_DECRYPT := true
          TW_INCLUDE_NTFS_3G := true
          TW_INCLUDE_FUSE_EXFAT := true
          TARGET_USERIMAGES_USE_EXT4 := true
          TARGET_USERIMAGES_USE_F2FS := true
          TW_THEME := portrait_hdpi
          TW_DEVICE_VERSION := R14
          TW_EXCLUDE_DEFAULT_USB_INIT := true
          TW_DEFAULT_LANGUAGE := zh_CN
          TW_BRIGHTNESS_PATH := "/sys/class/backlight/panel0-backlight/brightness"
          TW_MAX_BRIGHTNESS := 2047
          TW_DEFAULT_BRIGHTNESS := 1024
          TW_INPUT_WAKE_DEVICE := "/dev/input/event1"
          TW_HAS_DOWNLOAD_MODE := true
          TW_SUPPORT_USB_MTP := true
          TARGET_RECOVERY_PIXEL_FORMAT := "RGBX_8888"
          TARGET_RECOVERY_FSTAB := device/oppo/PHQ110/recovery.fstab
          EOF
          
          # recovery.fstab
          cat > recovery.fstab << 'EOF'
          /boot       emmc    /dev/block/by-name/boot        flags=slotselect;display="Boot"
          /dtbo       emmc    /dev/block/by-name/dtbo        flags=slotselect;display="DTBO"
          /system     ext4    /dev/block/by-name/system      flags=slotselect;display="System";mounttodecrypt
          /vendor     ext4    /dev/block/by-name/vendor      flags=slotselect;display="Vendor";mounttodecrypt
          /product    ext4    /dev/block/by-name/product     flags=slotselect;display="Product";mounttodecrypt
          /data       ext4    /dev/block/by-name/userdata    flags=encryptable=footer;length=-16384;display="Data"
          /cache      ext4    /dev/block/by-name/cache       flags=display="Cache"
          /metadata   ext4    /dev/block/by-name/metadata    flags=display="Metadata"
          /vbmeta     emmc    /dev/block/by-name/vbmeta      flags=slotselect;display="VBMeta"
          /vbmeta_system emmc /dev/block/by-name/vbmeta_system flags=slotselect;display="VBMeta System"
          /sdcard     vfat    /dev/block/mmcblk1p1           flags=display="SD Card";storage;removable
          /usb_otg    vfat    /dev/block/sda1                flags=display="USB OTG";storage;removable
          /persist    ext4    /dev/block/by-name/persist     flags=display="Persist"
          /misc       emmc    /dev/block/by-name/misc        flags=display="Misc"
          EOF
          
          # twrp_PHQ110.mk
          cat > twrp_${{ env.DEVICE }}.mk << 'EOF'
          $(call inherit-product, $(SRC_TARGET_DIR)/product/core_64_bit.mk)
          $(call inherit-product, $(SRC_TARGET_DIR)/product/aosp_base.mk)
          $(call inherit-product, $(SRC_TARGET_DIR)/product/embedded.mk)
          $(call inherit-product, vendor/twrp/config/common.mk)
          PRODUCT_DEVICE := PHQ110
          PRODUCT_NAME := twrp_PHQ110
          PRODUCT_BRAND := OPPO
          PRODUCT_MODEL := OPPO A1 Pro 5G
          PRODUCT_MANUFACTURER := OPPO
          PRODUCT_PROPERTY_OVERRIDES += ro.orangefox.version=R14 ro.orangefox.device=PHQ110 ro.orangefox.buildtype=Boot-as-Recovery
          EOF
          
          echo 'add_lunch_combo twrp_PHQ110-eng' > vendorsetup.sh
          echo "✓ Device tree created!"

      - name: "Compile OrangeFox Recovery [DEBUG ENABLED]"
        continue-on-error: false
        timeout-minutes: 180
        run: |
          cd ${{ github.workspace }}/orangefox
          export USE_CCACHE=1
          export CCACHE_DIR=${{ env.CCACHE_DIR }}
          ccache -M ${{ env.CCACHE_SIZE }}
          export JAVA_HOME=${{ env.JAVA_HOME }}
          export PATH=$JAVA_HOME/bin:$PATH
          
          source build/envsetup.sh
          lunch twrp_${{ env.DEVICE }}-eng
          
          echo "=== Starting Compilation ==="
          mka ${{ env.BUILD_TARGET }} -j$(nproc --all) 2>&1 | tee build.log
          
          echo ""
          echo "=== Build Output Images ==="
          ls -la out/target/product/${{ env.DEVICE }}/*.img 2>/dev/null || true
          
          # Check output
          if [ -f "out/target/product/${{ env.DEVICE }}/boot.img" ]; then
              echo "✓ Found boot.img (Boot-as-Recovery)"
          elif [ -f "out/target/product/${{ env.DEVICE }}/recovery.img" ]; then
              echo "✓ Found recovery.img"
          else
              echo "❌ No image generated!"
              tail -100 build.log
              exit 1
          fi
          
          echo "✓ Compilation successful!"

      - name: "Extract OrangeFox Recovery Ramdisk"
        continue-on-error: false
        timeout-minutes: 15
        run: |
          mkdir -p ${{ github.workspace }}/recovery_extract
          cd ${{ github.workspace }}/recovery_extract
          
          # Use boot.img first (BAR)
          if [ -f "${{ github.workspace }}/orangefox/out/target/product/${{ env.DEVICE }}/boot.img" ]; then
              cp "${{ github.workspace }}/orangefox/out/target/product/${{ env.DEVICE }}/boot.img" recovery.img
              echo "Using compiled boot.img"
          else
              cp "${{ github.workspace }}/orangefox/out/target/product/${{ env.DEVICE }}/recovery.img" recovery.img
              echo "Using compiled recovery.img"
          fi
          
          cp ${{ github.workspace }}/tools/magiskboot .
          ./magiskboot unpack recovery.img
          ls -la

      - name: "Patch Device Tree (DTB)"
        continue-on-error: false
        timeout-minutes: 20
        run: |
          mkdir -p ${{ github.workspace }}/dtb_patch
          cd ${{ github.workspace }}/dtb_patch
          cp ${{ github.workspace }}/stock_boot/dtb .
          cp dtb dtb.original
          fdtput -t s dtb /chosen bootargs "twrpfastboot=1 androidboot.selinux=permissive" 2>/dev/null || true
          echo "✓ DTB patched!"

      - name: "Replace Ramdisk and Patch Cmdline"
        continue-on-error: false
        timeout-minutes: 15
        run: |
          cd ${{ github.workspace }}/stock_boot
          cp ramdisk.cpio ramdisk.cpio.stock 2>/dev/null || true
          cp ${{ github.workspace }}/recovery_extract/ramdisk.cpio .
          cp ${{ github.workspace }}/dtb_patch/dtb dtb
          echo "✓ Ramdisk replaced with OrangeFox!"

      - name: "Repack Boot-as-Recovery Image"
        continue-on-error: false
        timeout-minutes: 15
        run: |
          cd ${{ github.workspace }}/stock_boot
          ./magiskboot repack boot.img OrangeFox-R14-PHQ110-boot.img
          ls -la OrangeFox-R14-PHQ110-boot.img
          echo "✓ Repack successful!"

      - name: "Prepare Final Artifacts"
        continue-on-error: false
        run: |
          mkdir -p ${{ github.workspace }}/final_artifacts
          
          # Copy repacked image
          if [ -f "${{ github.workspace }}/stock_boot/OrangeFox-R14-PHQ110-boot.img" ]; then
              cp ${{ github.workspace }}/stock_boot/OrangeFox-R14-PHQ110-boot.img ${{ github.workspace }}/final_artifacts/
              echo "✓ Copied repacked boot.img"
          fi
          
          # Copy compiled images
          if [ -f "${{ github.workspace }}/orangefox/out/target/product/${{ env.DEVICE }}/boot.img" ]; then
              cp "${{ github.workspace }}/orangefox/out/target/product/${{ env.DEVICE }}/boot.img" ${{ github.workspace }}/final_artifacts/OrangeFox-R14-PHQ110-compiled.img
          fi
          
          cd ${{ github.workspace }}/final_artifacts
          ls *.img 2>/dev/null && md5sum *.img > md5sums.txt
          ls -la

      - name: "Upload Final Artifacts [ROBUST]"
        uses: "actions/upload-artifact@v4"
        continue-on-error: true
        with:
          name: "OrangeFox-R14-Boot-as-Recovery-${{ env.DEVICE }}"
          path: |
            ${{ github.workspace }}/final_artifacts/*
            ${{ github.workspace }}/orangefox/build.log
          retention-days: 30
          if-no-files-found: warn

      - name: "Error Log Collection"
        continue-on-error: false
        if: failure()
        run: |
          echo "=== Build Failed ==="
          [ -f "${{ github.workspace }}/orangefox/build.log" ] && tail -150 ${{ github.workspace }}/orangefox/build.log || true
          df -h && free -h
          exit 1
