name: OPPO A1 Pro OrangeFox R14 Build
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      boot_img_url:
        description: Boot.img download URL (leave empty to use repo root boot.img)
        required: false
        default: ''
      device:
        description: Device codename
        required: true
        default: 'holi'
      branch:
        description: OrangeFox branch
        required: true
        default: '14.1'
        type: choice
        options:
          - '14.1'
          - '12.1'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Step 1 - Checkout repo
        uses: actions/checkout@v4

      - name: Step 2 - Clean workspace
        uses: rokibhasansagar/slimhub_actions@main

      - name: Step 3 - Create work dir
        run: |
          mkdir -p work
          echo "WORK_DIR=$(pwd)/work" >> $GITHUB_ENV

      - name: Step 4 - Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y git python3 python3-pip wget unzip openjdk-17-jdk rsync
          pip3 install twrpdtgen
          git clone https://gitlab.com/OrangeFox/misc/scripts
          cd scripts
          sudo bash setup/android_build_env.sh

      - name: Step 5 - Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Step 6 - Get boot.img
        run: |
          cd $WORK_DIR
          if [ -n "${{ inputs.boot_img_url }}" ]; then
            wget -O boot.img "${{ inputs.boot_img_url }}"
          else
            cp ../boot.img .
          fi

      - name: Step 7 - Unpack boot.img
        run: |
          cd $WORK_DIR
          git clone --depth 1 https://github.com/cfig/Android_boot_image_editor.git unpacker
          cd unpacker
          cp ../boot.img .
          ./gradlew unpack
          # Save cmdline to file
          cat build/unzip_boot/cmdline.txt > ../cmdline.txt
          # Copy modules
          mkdir -p ../prebuilt/modules
          find build/unzip_boot/ramdisk -name "*.ko" -type f -exec rsync -L {} ../prebuilt/modules/ \;
          # Copy firmware
          mkdir -p ../prebuilt/firmware
          find build/unzip_boot/ramdisk -type f -name "*.bin" -exec rsync -L {} ../prebuilt/firmware/ \; 2>/dev/null || true
          # Copy rc scripts
          mkdir -p ../prebuilt/rc
          find build/unzip_boot/ramdisk -name "init*.rc" -type f -exec rsync -L {} ../prebuilt/rc/ \;
          find build/unzip_boot/ramdisk -name "ueventd*.rc" -type f -exec rsync -L {} ../prebuilt/rc/ \;
          cd ..
          rm -rf unpacker

      - name: Step 8 - Generate device tree
        run: |
          cd $WORK_DIR
          python3 -m twrpdtgen boot.img -o dt
          mkdir -p device/qualcomm/${{ inputs.device }}
          cp -r dt/* device/qualcomm/${{ inputs.device }}/
          rm -rf dt

      - name: Step 9 - Add original cmdline
        run: |
          cd $WORK_DIR/device/qualcomm/${{ inputs.device }}
          echo "" >> BoardConfig.mk
          echo "# Original boot cmdline" >> BoardConfig.mk
          echo -n "BOARD_KERNEL_CMDLINE += " >> BoardConfig.mk
          cat $WORK_DIR/cmdline.txt >> BoardConfig.mk
          echo "" >> BoardConfig.mk

      - name: Step 10 - Add OrangeFox config
        run: |
          cd $WORK_DIR/device/qualcomm/${{ inputs.device }}
          cat >> BoardConfig.mk << 'EOF'
FOX_VIRTUAL_AB_DEVICE := 1
FOX_USES_RECOVERY_AS_BOOT := 1
FOX_NO_RECOVERY_PARTITION := 1
FOX_SUPPORT_AB_SLOTS := 1
FOX_BUILD_TYPE := Stable
FOX_VERSION := R14.1
FOX_BUILD_BOOTIMAGE := 1
FOX_DISABLE_HAPTICS := 1
BOARD_VNDK_VERSION := current

TW_INCLUDE_CRYPTO := true
TW_INCLUDE_CRYPTO_FBE := true
TW_INCLUDE_FBE_METADATA_DECRYPT := true
BOARD_USES_METADATA_PARTITION := true
TW_USE_FSCRYPT_POLICY := 2
TW_PREPARE_DATA_MEDIA_EARLY := true
BOARD_USES_QCOM_FBE_DECRYPTION := true
TARGET_CRYPTFS_HW_PATH := vendor/qcom/opensource/commonsys/cryptfs_hw
TW_OZIP_DECRYPT_KEY := 1C4C1EA3A12531AE491B21BB31613C11

FOX_DISABLE_AVB := 1
FOX_PATCH_VBMETA := 1

BOARD_USES_PRODUCTIMAGE := true
BOARD_USES_VENDORIMAGE := true
BOARD_ROOT_EXTRA_FOLDERS := odm product vendor

BUILD_BROKEN_DUP_RULES := true
BUILD_BROKEN_ELF_PREBUILT_PRODUCT_COPY_FILES := true
ALLOW_MISSING_DEPENDENCIES := true
EOF

      - name: Step 11 - Copy prebuilt files
        run: |
          cd $WORK_DIR/device/qualcomm/${{ inputs.device }}
          mkdir -p prebuilt
          cp -r $WORK_DIR/prebuilt/modules prebuilt/
          cp -r $WORK_DIR/prebuilt/firmware prebuilt/
          mkdir -p recovery/root
          cp -r $WORK_DIR/prebuilt/rc/* recovery/root/

      - name: Step 12 - Update recovery.fstab
        run: |
          cd $WORK_DIR/device/qualcomm/${{ inputs.device }}
          cat >> recovery.fstab << 'EOF'

/data f2fs /dev/block/by-name/userdata flags=encryptable=footer
/metadata ext4 /dev/block/by-name/metadata flags=backup=1
/vendor_boot emmc /dev/block/by-name/vendor_boot flags=backup=1;slotselect
/dtbo emmc /dev/block/by-name/dtbo flags=backup=1;slotselect
/vbmeta emmc /dev/block/by-name/vbmeta flags=backup=1;slotselect
/vbmeta_system emmc /dev/block/by-name/vbmeta_system flags=backup=1;slotselect
EOF

      - name: Step 13 - Update device.mk
        run: |
          cd $WORK_DIR/device/qualcomm/${{ inputs.device }}
          cat >> device.mk << 'EOF'

PRODUCT_RELEASE_NAME := holi
PRODUCT_DEVICE := holi
PRODUCT_NAME := twrp_holi
PRODUCT_BRAND := OPPO
PRODUCT_MODEL := OPPO A1 Pro 5G
PRODUCT_MANUFACTURER := OPPO

PRODUCT_USE_DYNAMIC_PARTITIONS := true
PRODUCT_BUILD_SUPER_PARTITIONS := false

PRODUCT_PACKAGES += qcom_decrypt qcom_decrypt_fbe
PRODUCT_PACKAGES += busybox mkshrc toybox_static

PRODUCT_COPY_FILES += $(call find-copy-subdir-files,*,device/qualcomm/holi/prebuilt/modules,lib/modules)
PRODUCT_COPY_FILES += $(call find-copy-subdir-files,*,device/qualcomm/holi/prebuilt/firmware,vendor/firmware)
PRODUCT_COPY_FILES += $(call find-copy-subdir-files,*,device/qualcomm/holi/recovery/root,root)
EOF

      - name: Step 14 - Sync OrangeFox source
        run: |
          cd $WORK_DIR
          git clone https://gitlab.com/OrangeFox/sync.git
          cd sync
          ./orangefox_sync.sh --branch ${{ inputs.branch }} --path $WORK_DIR/fox
          cp -r $WORK_DIR/device $WORK_DIR/fox/

      - name: Step 15 - Setup swap
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Step 16 - Build OrangeFox
        run: |
          cd $WORK_DIR/fox
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_${{ inputs.device }}-ap2a-eng
          make clean
          mka adbd bootimage -j$(nproc)

      - name: Step 17 - Verify output
        run: |
          OUT=$WORK_DIR/fox/out/target/product/${{ inputs.device }}
          ls -lh $OUT/boot.img
          if [ ! -f $OUT/boot.img ]; then
            echo "Build failed!"
            exit 1
          fi

      - name: Step 18 - Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.WORK_DIR }}/fox/out/target/product/${{ inputs.device }}/boot.img
          name: OrangeFox R14.1 for OPPO A1 Pro
          tag_name: build-${{ github.run_id }}
          body: |
            Flash command:
            fastboot flash boot_a boot.img
            fastboot flash boot_b boot.img
            fastboot reboot recovery
